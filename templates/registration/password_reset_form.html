{% extends 'base.html' %}

{% block content %}
<div class="content-section">
    <h2>Password Reset</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" required placeholder="Your email" style="width:100%; padding:8px; margin-bottom:8px;">
        <button type="submit">Send reset email</button>
    </form>
</div>
{% endblock %}
