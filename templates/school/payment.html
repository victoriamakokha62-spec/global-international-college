{% extends 'base.html' %}

{% block content %}
<div class="content-section">
    <h2>Make a Payment (M-Pesa)</h2>
    <p>Use the form below to request an M-Pesa STK push (sandbox/testing).</p>

    <form id="mpesa-form" method="post" action="{% url 'mpesa_stk_push' %}">
        {% csrf_token %}
        <label for="phone">Phone (format 2547...):</label>
        <input type="text" id="phone" name="phone" placeholder="254712345678" required>

        <label for="amount">Amount (KES):</label>
        <input type="number" id="amount" name="amount" min="1" value="100" required>

        <button type="submit">Pay with M-Pesa</button>
    </form>

    <div id="mpesa-result" style="margin-top:1rem;"></div>
</div>

<script>
document.getElementById('mpesa-form').addEventListener('submit', async function(e){
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    const resp = await fetch(form.action, { method: 'POST', body: data, headers: {'X-Requested-With':'XMLHttpRequest'} });
    const json = await resp.json();
    const out = document.getElementById('mpesa-result');
    if(json.success){
        out.innerText = 'STK Push requested. Check your phone to approve the payment.';
    } else {
        out.innerText = 'Error: ' + (json.error || JSON.stringify(json.response));
    }
});
</script>
{% endblock %}
