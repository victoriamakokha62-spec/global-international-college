{% extends 'base.html' %}

{% block title %}Login - Global International College{% endblock %}

{% block content %}
<div class="hero">
    <h1>Student Login</h1>
    <p>Access Your Portal</p>
</div>

<div class="content-section">
    <div style="max-width: 500px; margin: 0 auto;">
        <h2>Login to Your Account</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <input type="text" name="email_or_username" placeholder="Email or Username" class="form-control" required>
            
            <input type="password" name="password" placeholder="Password" class="form-control" required>
            
            <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p style="margin-top: 1rem; text-align: center;">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
